name: Build

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch: {}

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Export version
        id: version
        run: |
          version=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v7
        with:
          name: vapoursynth-vszipcl-sdist
          path: dist/*.tar.gz

  check-tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-sdist
    outputs:
      exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: mukunku/tag-exists-action@v1.7.0
        id: check-tag
        with:
          tag: ${{ needs.build-sdist.outputs.version }}

  build-wheel:
    if: >-
      always() &&
      needs.build-sdist.result == 'success' &&
      (needs.check-tag.result == 'skipped' || needs.check-tag.outputs.exists == 'false')
    needs:
      - build-sdist
      - check-tag
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            os: ubuntu-latest
          - target: aarch64-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-macos
            os: macos-15
          - target: x86_64-macos
            os: macos-15-intel
          - target: x86_64-windows
            os: windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install OpenCL loader + repair tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev pocl-opencl-icd patchelf
          pip install auditwheel

      - name: Build wheel
        shell: bash
        env:
          ZTARGET: ${{ matrix.target }}
        run: |
          pip install build
          python -m build --wheel --outdir dist

      # Vendor libOpenCL.so.1 into the wheel and let auditwheel VALIDATE the manylinux tag
      # (it is not on the manylinux allowlist, so the hand-asserted tag would otherwise be
      # out of spec). The bundled loader is a thin ICD dispatcher — at runtime it still finds
      # the installed GPU driver via /etc/OpenCL/vendors — so the wheel imports on a host that
      # has a driver but no ocl-icd package.
      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          auditwheel repair --wheel-dir wheelhouse dist/*.whl
          ls -l wheelhouse

      # Windows/macOS link a SYSTEM loader (OpenCL.dll / OpenCL.framework), so nothing is
      # vendored and no repair is needed — just collect the built wheel.
      - name: Collect wheel (Windows / macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p wheelhouse
          cp dist/*.whl wheelhouse/

      # Smoke needs an OpenCL device: Linux installs pocl above. GHA Windows/macOS ship no
      # usable OpenCL runtime (NoPlatforms / enqueue failures) — wheels still build on all OSes.
      - name: Smoke test (${{ matrix.target }})
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pip install VapourSynth numpy
          pip install wheelhouse/*.whl
          python .github/smoke.py

      - uses: actions/upload-artifact@v7
        with:
          name: vapoursynth-vszipcl-${{ matrix.target }}
          path: wheelhouse/*.whl

  # PyPI publish + GitHub release, only when this version has not been released yet. The release
  # creates the `${version}` tag at the pushed commit (softprops action-gh-release), which is what
  # check-tag looks for on the next push.
  release:
    if: needs.check-tag.outputs.exists == 'false'
    runs-on: ubuntu-latest
    needs:
      - check-tag
      - build-sdist
      - build-wheel
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-sdist.outputs.version }}

      - uses: pypa/gh-action-pypi-publish@release/v1
